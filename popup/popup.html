<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gitea PR Review Exporter</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="popup">
      <div class="title-row">
        <div class="title-wrap">
          <img class="logo" src="../icons/icon-32.png" alt="Gitea PR Review Exporter logo" />
          <div>
            <h1>Gitea PR Review Exporter</h1>
            <p class="subtitle">PR conversation export helper</p>
            <p id="headerContext" class="header-context"></p>
          </div>
        </div>
        <div class="theme-switch" role="group" aria-label="Theme mode">
          <button id="themeDarkBtn" class="theme-btn" type="button" title="Dark mode">
            <span class="theme-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
                <path fill="currentColor" d="M11.9 2.2a.8.8 0 0 1 .64 1.3A6.4 6.4 0 1 0 16.5 14a.8.8 0 0 1 1.23.88A8 8 0 1 1 11.1 2.25a.8.8 0 0 1 .8-.05Z"/>
              </svg>
            </span>
          </button>
          <button id="themeLightBtn" class="theme-btn" type="button" title="Light mode">
            <span class="theme-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
                <path fill="currentColor" d="M10 4.2a.9.9 0 0 1 .9.9v.8a.9.9 0 1 1-1.8 0V5.1a.9.9 0 0 1 .9-.9Zm0 9a.9.9 0 0 1 .9.9v.8a.9.9 0 1 1-1.8 0v-.8a.9.9 0 0 1 .9-.9Zm5.8-4.1a.9.9 0 1 1 0 1.8H15a.9.9 0 1 1 0-1.8h.8Zm-11 0a.9.9 0 1 1 0 1.8H4a.9.9 0 1 1 0-1.8h.8ZM14 6.1a.9.9 0 0 1 1.27 1.27l-.56.56a.9.9 0 1 1-1.27-1.27l.56-.56Zm-8.14 8.14a.9.9 0 0 1 1.27 1.27l-.56.56a.9.9 0 1 1-1.27-1.27l.56-.56Zm0-8.14.56.56a.9.9 0 1 1-1.27 1.27l-.56-.56a.9.9 0 1 1 1.27-1.27Zm8.14 8.14.56.56a.9.9 0 1 1-1.27 1.27l-.56-.56a.9.9 0 1 1 1.27-1.27ZM10 7a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"/>
              </svg>
            </span>
          </button>
        </div>
      </div>

      <section class="panel">
        <p id="summary" class="summary">No scrape run yet.</p>
        <div class="filters">
          <label class="field-label" for="userNameInput">Git user name</label>
          <input id="userNameInput" type="text" placeholder="Detected from page" autocomplete="off" />
          <p class="field-help">Used by the last-comment filter and test selection diagnostics.</p>
          <label class="check-row" for="ignoreResolvedCheckbox" title="Exclude resolved conversations from exports and tests.">
            <input id="ignoreResolvedCheckbox" type="checkbox" checked title="Exclude resolved conversations from exports and tests." />
            <span>Ignore resolved changes</span>
          </label>
          <label class="check-row" for="ignoreOutdatedCheckbox" title="Exclude outdated conversations from exports and tests.">
            <input id="ignoreOutdatedCheckbox" type="checkbox" checked title="Exclude outdated conversations from exports and tests." />
            <span>Ignore outdated changes</span>
          </label>
          <label class="check-row" for="ignoreCommentsCheckbox" title="Exclude standalone timeline comments from exports and tests.">
            <input id="ignoreCommentsCheckbox" type="checkbox" checked title="Exclude standalone timeline comments from exports and tests." />
            <span>Ignore comments</span>
          </label>
          <label class="check-row" for="shortKeysCheckbox" title="Use shortened JSON keys for compact agent export.">
            <input id="shortKeysCheckbox" type="checkbox" checked title="Use shortened JSON keys for compact agent export." />
            <span>Use shortened JSON keys</span>
            <span
              class="option-tip"
              aria-label="Shortened keys reduce token usage for LLM ingestion while preserving values."
              title="Shortened keys reduce token usage for LLM ingestion while preserving values."
            >i</span>
          </label>
          <label class="check-row" for="minifyJsonCheckbox" title="Emit compact JSON instead of pretty-printed JSON.">
            <input id="minifyJsonCheckbox" type="checkbox" title="Emit compact JSON instead of pretty-printed JSON." />
            <span>Minify JSON output</span>
            <span
              class="option-tip"
              aria-label="Minifying JSON reduces characters and typically lowers token consumption."
              title="Minifying JSON reduces characters and typically lowers token consumption."
            >i</span>
          </label>
          <label class="check-row" for="includeScriptStatsCheckbox" title="Include applied filters and statistics in the exported JSON.">
            <input id="includeScriptStatsCheckbox" type="checkbox" title="Include applied filters and statistics in the exported JSON." />
            <span>Script stats</span>
          </label>
          <label class="check-row" for="giveAiContextCheckbox" title="Export AI-ready instructions plus schema v2 data instead of plain JSON.">
            <input id="giveAiContextCheckbox" type="checkbox" title="Export AI-ready instructions plus schema v2 data instead of plain JSON." />
            <span>Give AI Context</span>
          </label>
          <label class="check-row" for="debugCheckbox" title="Show the bottom status/error debug area.">
            <input id="debugCheckbox" type="checkbox" title="Show the bottom status/error debug area." />
            <span>Debug</span>
          </label>
          <label class="check-row" for="verboseDiagnosticsCheckbox" title="Collect detailed per-thread diagnostics and performance data.">
            <input id="verboseDiagnosticsCheckbox" type="checkbox" title="Collect detailed per-thread diagnostics and performance data." />
            <span>Verbose diagnostics</span>
          </label>
          <!-- Keep this option as the final filter row; popup/system.js enforces this position as a safeguard. -->
          <label class="check-row" for="ignoreLastCommentCheckbox" data-gpre-last-filter="1" title="Exclude conversations where the most recent comment is from the selected Git user.">
            <input id="ignoreLastCommentCheckbox" type="checkbox" checked title="Exclude conversations where the most recent comment is from the selected Git user." />
            <span>Ignore where last comment is from user</span>
          </label>
        </div>
      </section>

      <div class="actions">
        <button id="copyBtn" class="copy-top-btn icon-btn" type="button">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
              <path fill="currentColor" d="M6 2.8A2.2 2.2 0 0 0 3.8 5v8A2.2 2.2 0 0 0 6 15.2h1.1v.4A2.4 2.4 0 0 0 9.5 18h5a2.4 2.4 0 0 0 2.4-2.4v-7a2.4 2.4 0 0 0-2.4-2.4h-5A2.4 2.4 0 0 0 7.1 8.6v4.8H6a.4.4 0 0 1-.4-.4V5c0-.22.18-.4.4-.4h5c.22 0 .4.18.4.4v.4h1.8V5a2.2 2.2 0 0 0-2.2-2.2H6Zm3.5 5.2h5c.33 0 .6.27.6.6v7a.6.6 0 0 1-.6.6h-5a.6.6 0 0 1-.6-.6v-7c0-.33.27-.6.6-.6Z"/>
            </svg>
          </span>
          <span>Copy JSON</span>
        </button>

        <section
          id="downloadBundleWrapper"
          class="download-bundle-wrapper"
          role="button"
          tabindex="0"
          aria-label="Download JSON and diff in one ZIP file"
          title="Download JSON and diff together in one ZIP"
        >
          <div class="download-bundle-head">
            <p class="download-bundle-title">Download Bundle (ZIP)</p>
            <span id="downloadBundleState" class="download-bundle-state" aria-live="polite">Ready</span>
          </div>
          <p class="download-bundle-subtitle">Click this card to download one ZIP with both files.</p>
          <div class="download-buttons">
            <button id="downloadBtn" class="icon-btn" type="button">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
                  <path fill="currentColor" d="M10 2.6a.9.9 0 0 1 .9.9v6.14l1.84-1.84a.9.9 0 0 1 1.27 1.27l-3.4 3.4a.9.9 0 0 1-1.27 0l-3.4-3.4A.9.9 0 0 1 7.2 7.8l1.9 1.9V3.5a.9.9 0 0 1 .9-.9Zm-5 10.1a.9.9 0 0 1 .9.9v1c0 .33.27.6.6.6h7a.6.6 0 0 0 .6-.6v-1a.9.9 0 1 1 1.8 0v1a2.4 2.4 0 0 1-2.4 2.4h-7a2.4 2.4 0 0 1-2.4-2.4v-1a.9.9 0 0 1 .9-.9Z"/>
                </svg>
              </span>
              <span>Download JSON</span>
            </button>
            <button id="downloadDiffBtn" class="icon-btn" type="button">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
                  <path fill="currentColor" d="M4.8 2.8A2.2 2.2 0 0 0 2.6 5v10A2.2 2.2 0 0 0 4.8 17.2h10.4a2.2 2.2 0 0 0 2.2-2.2V7.6a.9.9 0 0 0-.26-.64l-3.7-3.7A.9.9 0 0 0 12.8 3H4.8Zm8.4 1.99 2.21 2.21H13.2V4.79ZM9.1 8.9a.9.9 0 1 1 1.8 0v1.2h1.2a.9.9 0 1 1 0 1.8h-1.2v1.2a.9.9 0 1 1-1.8 0v-1.2H7.9a.9.9 0 1 1 0-1.8h1.2V8.9Z"/>
                </svg>
              </span>
              <span>Download Diff</span>
            </button>
          </div>
        </section>

        <div class="test-actions">
          <button id="testSelectionBtn" class="split-btn" type="button">Test Selection</button>
          <button id="testHighlightsBtn" class="split-btn" type="button">Test Highlights</button>
        </div>
      </div>

      <section id="feedbackPanel" class="feedback">
        <p id="status" class="status" aria-live="polite"></p>
        <p id="error" class="error" aria-live="polite"></p>
      </section>

      <div id="diagnosticsActions" class="diagnostics-actions debug-hidden">
        <button id="copyDiagnosticsBtn" class="icon-btn" type="button" title="Copy the latest diagnostics payload as JSON.">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
              <path fill="currentColor" d="M6 2.8A2.2 2.2 0 0 0 3.8 5v8A2.2 2.2 0 0 0 6 15.2h1.1v.4A2.4 2.4 0 0 0 9.5 18h5a2.4 2.4 0 0 0 2.4-2.4v-7a2.4 2.4 0 0 0-2.4-2.4h-5A2.4 2.4 0 0 0 7.1 8.6v4.8H6a.4.4 0 0 1-.4-.4V5c0-.22.18-.4.4-.4h5c.22 0 .4.18.4.4v.4h1.8V5a2.2 2.2 0 0 0-2.2-2.2H6Zm3.5 5.2h5c.33 0 .6.27.6.6v7a.6.6 0 0 1-.6.6h-5a.6.6 0 0 1-.6-.6v-7c0-.33.27-.6.6-.6Z"/>
            </svg>
          </span>
          <span>Copy Diagnostics</span>
        </button>
        <button id="downloadDiagnosticsBtn" class="icon-btn" type="button" title="Download the latest diagnostics payload as JSON.">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="12" height="12" focusable="false">
              <path fill="currentColor" d="M10 2.6a.9.9 0 0 1 .9.9v6.14l1.84-1.84a.9.9 0 0 1 1.27 1.27l-3.4 3.4a.9.9 0 0 1-1.27 0l-3.4-3.4A.9.9 0 0 1 7.2 7.8l1.9 1.9V3.5a.9.9 0 0 1 .9-.9Zm-5 10.1a.9.9 0 0 1 .9.9v1c0 .33.27.6.6.6h7a.6.6 0 0 0 .6-.6v-1a.9.9 0 1 1 1.8 0v1a2.4 2.4 0 0 1-2.4 2.4h-7a2.4 2.4 0 0 1-2.4-2.4v-1a.9.9 0 0 1 .9-.9Z"/>
            </svg>
          </span>
          <span>Download Diagnostics</span>
        </button>
      </div>
    </main>

    <script src="../shared/export-serializer.js"></script>
    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="system.js"></script>
    <script src="core.js"></script>
    <script src="main.js"></script>
  </body>
</html>
